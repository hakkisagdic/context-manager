# Publishes ctxman to npm when a Release is created.
#
# Uses npm **Trusted Publishing (OIDC)** — no NPM_TOKEN secret. GitHub Actions
# proves this workflow's identity to npm with a short-lived OIDC token and npm
# attaches build provenance automatically.
#
# One-time setup on npmjs.com (the package already exists):
#   Package ctxman → Settings → Trusted Publisher →
#   GitHub Actions:  user hakkisagdic · repository ctxman ·
#   workflow filename npm-publish.yml
name: Node.js Package

on:
  release:
    types: [created]
  push:
    tags: ['v*']   # git tag vX.Y.Z && git push --tags
  workflow_dispatch:  # Manuel tetikleme için

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      # OIDC publishing needs npm >= 11.5.1; the runner's bundled npm is older.
      - run: npm install -g npm@latest
      - run: npm ci
      # No NODE_AUTH_TOKEN — authentication happens via OIDC.
      - run: npm publish --provenance --access public
